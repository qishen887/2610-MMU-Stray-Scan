<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stray Scan - Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> 
        body {
            background-image: url("{{ url_for('static', filename='pictureMMU.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #667eea;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .forgot-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
        }
        .btn-primary {
            background-color: #667eea;
            border: none;
        }
        .btn-primary:hover {
            background-color: #5a6fd6;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card forgot-card p-4">
                    <div class="card-body">
                        <h3 class="text-center mb-4 fw-bold">Reset Password</h3>
                        <p class="text-center text-muted mb-4">Enter your MMU email to set a new password</p>

                        {% with messages = get_flashed_messages() %}
                          {% if messages %}
                            {% for message in messages %}
                              <div class="alert alert-warning py-2" role="alert">
                                {{ message }}
                              </div>
                            {% endfor %}
                          {% endif %}
                        {% endwith %}

                        <form action="/reset-password" method="POST">
                            <div class="mb-3">
                                <label class="form-label">MMU Email address</label>
                                <input type="email" name="email" class="form-control" placeholder="name@student.mmu.edu.my" required pattern=".+@student\.mmu\.edu\.my|.+@mmu\.edu\.my" title="Please use your official MMU email">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <div class="input-group">
                                    <input type="password" name="password" id="password" class="form-control" placeholder="New 8-digit password" required pattern="\d{8}" title="Must be exactly 8 numbers.">
                                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password', this)">👁️</button>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Confirm New Password</label>
                                <div class="input-group">
                                    <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="Repeat new password" required pattern="\d{8}">
                                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirm_password', this)">👁️</button>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">Update Password</button>
                            </div>
                        </form>
                        
                        <hr class="my-4">
                        <div class="text-center">
                            <small class="text-muted">Remembered? <a href="{{ url_for('show_login') }}" class="text-decoration-none">Back to Login</a></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input) {
            if (input.type === "password") {
                input.type = "text";
                btn.textContent = "🕶️";
            } else {
                input.type = "password";
                btn.textContent = "👁️";
            }
        }
    }
    </script>
</body>
</html>
