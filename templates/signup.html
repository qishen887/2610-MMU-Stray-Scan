<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stray Scan - Sign Up</title>
    <!-- 引入相同的 Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> 
        body {
            /* 使用与登录页完全相同的背景配置 */
            background-image: url("{{ url_for('static', filename='pictureMMU.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #667eea;

            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 复用磨砂玻璃卡片样式 */
        .signup-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
        }

        .btn-primary {
            background-color: #667eea;
            border: none;
        }
        .btn-primary:hover {
            background-color: #5a6fd6;
        }
        .input-group-text {
            border-color: #dee2e6;
            background-color: white;
        }
        .input-group .btn:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card signup-card p-4">
                    <div class="card-body">
                        <!-- 相同的 Logo 和 标题 -->
                        <h3 class="text-center mb-4 fw-bold d-flex align-items-center justify-content-center">
                            <img src="{{ url_for('static', filename='logo.png') }}" 
                                 alt="Logo" 
                                 style="width: 40px; height: auto; margin-right: 10px;">
                            Join Stray Scan
                        </h3>
                        <p class="text-center text-muted mb-4">Create an account to help our community</p>

                        <!-- 消息闪现 (显示注册错误或提示) -->
                        {% with messages = get_flashed_messages() %}
                          {% if messages %}
                            {% for message in messages %}
                              <div class="alert alert-warning py-2" role="alert">
                                {{ message }}
                              </div>
                            {% endfor %}
                          {% endif %}
                        {% endwith %}

                        <!-- 注册表单，Action 指向你的 /signup 路由 -->
                        <form action="/signup" method="POST">
                            <div class="mb-3">
                                <label class="form-label">MMU Email address</label>
                                <input type="email" name="email" class="form-control" placeholder="name@student.mmu.edu.my/@mmu.edu.my" required pattern=".+@student\.mmu\.edu\.my|.+@mmu\.edu\.my"title="Please use your official MMU email (@student.mmu.edu.my or @mmu.edu.my)">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" placeholder="Create password" required minlength="8"title="Please enter numbers only(0-9).">
                            </div>
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password', this)">
                                <i class="bi bi-eye-slash"></i>
                            </button>
                            <div class="mb-3">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required minlength="8" >
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirm_password', this)">
                                    <i class="bi bi-eye-slash"></i>
                                </button>
                            </div>
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
                            </div>
                        </form>
                        
                        <hr class="my-4">
                        <div class="text-center">
                            <small class="text-muted">Already have an account? <a href="{{ url_for('index') }}" class="text-decoration-none">Login</a></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === "password") {
        input.type = "text";  // 变成可见文字
        btn.innerHTML = '<i class="bi bi-eye"></i>'; // 切换图标（可选）
    } else {
        input.type = "password"; // 变回圆点
        btn.innerHTML = '<i class="bi bi-eye-slash"></i>';
    }
}

</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
