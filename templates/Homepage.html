<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberjaya Stray Scan</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div class="app-container">
        <div id="sidebar">
            <div class="sidebar-item" onclick="toggleSidebar()" title="Toggle Menu">
                <div style="font-size: 24px;">&#9776;</div>
            </div>
            
<div class="sidebar-item" onclick="window.location.href=`{{ url_for('login_page') }}`" title="Login" style="cursor: pointer;">
    <div style="font-size: 20px;">&#128100;</div>
    <span>Login</span>
</div>

<div class="sidebar-item" onclick="window.location.href=`{{ url_for('signup') }}`" title="Register" style="cursor: pointer;">
    <div style="font-size: 20px;">&#128221;</div>
    <span>Register</span>
</div>

<div class="sidebar-item" 
         onclick="window.location.href=`{{ url_for('report') }}`" 
         title="Report" 
         style="cursor: pointer;">
        <div style="font-size: 20px;">&#128203;</div>
        <span>New Report</span>
    </div>

<div class="sidebar-item" title="Record">
    <span>Past Record</span>
</div>
            <div class="spacer"></div>

<div class="sidebar-item" onclick="toggleSettings()" title="Settings" style="cursor: pointer;">
    <div style="font-size: 20px;">&#9881;</div>
    <span>Settings</span>
</div>
        </div>

        <div id="main-content">
            <header>
                <h1 style="margin: 0;">Cyberjaya Stray Scan</h1>
                <nav>
                    <button>About</button>
                    <button>Contact</button>
                </nav>
            </header>

            <div id="map">
                <button id="recenter-btn" onclick="recenterMap(event)">📍 Recenter to Origin</button>
            </div>

            <section>
    <h2>Quick Actions</h2>
    <button id="filter-btn" onclick="toggleFilters(event)" style="background-color: #f09c16; color: white;"> Filters</button>
</section>

<div id="filterModal" class="settings-bottom-panel" style="display: none;">
    <div class="console-box solid-version" style="max-width: 500px; margin: 0 auto;">
        <div class="console-body" style="padding: 20px; color: white;">
            <h3 style="margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px;">Map Filters</h3>
            
            <div style="margin-bottom: 20px;">
                <p style="font-weight: 600; margin-bottom: 8px; color: #f09c16;">Animal Type:</p>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                    <label><input type="checkbox" name="animalFilter" value="dog" checked> 🐕 Dog</label>
                    <label><input type="checkbox" name="animalFilter" value="cat" checked> 🐈 Cat</label>
                    <label><input type="checkbox" name="animalFilter" value="rabbit" checked> 🐰 Rabbit</label>
                    <label><input type="checkbox" name="animalFilter" value="bird" checked> 🐦 Bird</label>
                    <label><input type="checkbox" name="animalFilter" value="squirrel" checked> 🐿️ Squirrel</label>
                    <label><input type="checkbox" name="animalFilter" value="other" checked> Other</label>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <p style="font-weight: 600; margin-bottom: 8px; color: #f09c16;">Health Status:</p>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                    <label><input type="checkbox" name="healthFilter" value="healthy" checked> 💚 Healthy</label>
                    <label><input type="checkbox" name="healthFilter" value="injured" checked> 🩹 Hurt</label>
                    <label><input type="checkbox" name="healthFilter" value="sick" checked> 🤒 Sick</label>
                    <label><input type="checkbox" name="healthFilter" value="unknown" checked> ❓ Not sure</label>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                <button onclick="applyFilters()" style="background: #43e97b; color: black; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: 600;">Apply Filters</button>
                <p class="console-status" onclick="closeFilters()" style="cursor:pointer; margin: 0; padding-top: 5px;">[ Close ]</p>
            </div>
        </div>
    </div>
</div>
        </div>
    </div>

    <script>
        // --- Global Variables ---
        const cyberCoord = [2.9213, 101.6559];
        let userPos = null;
        var marker;

        // --- Map Initialization ---
        var map = L.map('map').setView(cyberCoord, 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Auto-detect user position
map.locate({setView: true, maxZoom: 16});
map.on('locationfound', function(e) {
    userPos = e.latlng;
    if (marker) map.removeLayer(marker);
    // 把 "Origin Detected" 改成了 "Your current location"
    marker = L.marker(e.latlng).addTo(map).bindPopup("Your current location").openPopup();
});

        // --- Logic Functions ---

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            // Allow map to recalculate its width after transition
            setTimeout(() => { map.invalidateSize(); }, 350);
        }

        function recenterMap(event) {
            event.stopPropagation(); // Prevent map click event
            map.flyTo(userPos || cyberCoord, 16);
        }

        // Add marker on manual click
        map.on('click', function(e) {
            if (marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map).bindPopup("Pinned Location").openPopup();
        });

        // Fix rendering on initial load
        window.onload = function() {
            setTimeout(() => { map.invalidateSize(); }, 500);
        };

/* --- Improved Toggle Logic --- */

function toggleSettings() {
    const modal = document.getElementById('settingsModal');
    // Toggle between show (block) and hide (none)
    if (modal.style.display === 'block') {
        modal.style.display = 'none';
    } else {
        modal.style.display = 'block';
    }
}

// Keep the specific close function for background clicks
function closeSettings() {
    document.getElementById('settingsModal').style.display = 'none';
}

// Background change logic
function changeBg(color) {
    const mainContent = document.getElementById('main-content');
    if (!mainContent) return;

    if (color === 'default') {
        mainContent.style.backgroundImage = ""; 
    } else {
        mainContent.style.backgroundImage = "none";
        mainContent.style.backgroundColor = color;
    }
}

// 点击页面任意外部区域时，自动关闭打开的面板
window.addEventListener('click', function(event) {
    // 1. 处理设置面板的关闭
    const settingsModal = document.getElementById('settingsModal');
    const settingsBtn = document.querySelector('[title="Settings"]');
    if (settingsModal && settingsModal.style.display === 'block' && 
        !settingsModal.contains(event.target) && 
        !settingsBtn.contains(event.target)) {
        closeSettings();
    }

    // 2. 处理筛选面板的关闭
    const filterModal = document.getElementById('filterModal');
    const filterBtn = document.getElementById('filter-btn');
    if (filterModal && filterModal.style.display === 'block' && 
        !filterModal.contains(event.target) && 
        !filterBtn.contains(event.target)) {
        closeFilters();
    }
});
// --- Filters 筛选面板控制逻辑 ---

// 打开或关闭 Filter 面板
function toggleFilters(event) {
    if (event) event.stopPropagation(); // 阻止事件冒泡，防止触发 window 点击
    const modal = document.getElementById('filterModal');
    if (modal.style.display === 'block') {
        modal.style.display = 'none';
    } else {
        modal.style.display = 'block';
    }
}

// 关闭 Filter 面板
function closeFilters() {
    document.getElementById('filterModal').style.display = 'none';
}

// 点击 Apply 按钮时触发的筛选过滤逻辑
function applyFilters() {
    // 获取用户勾选的所有动物类型
    const selectedAnimals = Array.from(document.querySelectorAll('input[name="animalFilter"]:checked')).map(cb => cb.value);
    // 获取用户勾选的所有健康状态
    const selectedHealth = Array.from(document.querySelectorAll('input[name="healthFilter"]:checked')).map(cb => cb.value);

    console.log("Selected Animals:", selectedAnimals);
    console.log("Selected Health:", selectedHealth);

    // 过滤完成后自动关闭面板
    closeFilters();
}
    </script>
<div id="settingsModal" class="settings-bottom-panel">
    <div class="console-box solid-version">
        <div class="console-body">
            <div class="settings-list">
                <div class="settings-item" onclick="changeBg('default')">
                    <span>Default Theme</span>
                    <div class="color-preview" style="background: linear-gradient(135deg, #f09c16, #000);"></div>
                </div>
                <div class="settings-item" onclick="changeBg('#1a1a1a')">
                    <span>Midnight Black</span>
                    <div class="color-preview" style="background: #1a1a1a;"></div>
                </div>
                <div class="settings-item" onclick="changeBg('#0f172a')">
                    <span>Deep Blue</span>
                    <div class="color-preview" style="background: #0f172a;"></div>
                </div>
            </div>
            <p class="console-status" onclick="closeSettings()" style="cursor:pointer; text-align:center;">[ Close Panel ]</p>
        </div>
    </div>
</div>
</body>
</html>
