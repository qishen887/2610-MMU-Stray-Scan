<div id="filterModal" class="settings-bottom-panel" style="display: none;">
    <div class="console-box solid-version" style="max-width: 500px; margin: 0 auto;">
        <div class="console-body" style="padding: 20px; color: white;">
            <h3 style="margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px;">Map Filters</h3>
            
            <div style="margin-bottom: 20px;">
                <p style="font-weight: 600; margin-bottom: 8px; color: #f09c16;">Animal Type:</p>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                    <label><input type="checkbox" name="animalFilter" value="dog" checked> 🐕 Dog</label>

                    <label><input type="checkbox" name="animalFilter" value="squirrel" checked> 🐿️ Squirrel</label>
                    <label><input type="checkbox" name="animalFilter" value="other" checked> Other</label>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <p style="font-weight: 600; margin-bottom: 8px; color: #f09c16;">Health Status:</p>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                    <label><input type="checkbox" name="healthFilter" value="healthy" checked> 💚 Healthy</label>
                    <label><input type="checkbox" name="healthFilter" value="injured" checked> 🩹 Hurt</label>
                    <label><input type="checkbox" name="healthFilter" value="sick" checked> 🤒 Sick</label>

            <div style="display: flex; justify-content: space-between; margin-top: 15px;">

            </div>
        </div>

    <script>
        // --- Global Variables ---
        const cyberCoord = [2.9213, 101.6559];
        let userPos = null;
        var marker;

        // --- Map Initialization ---
        var map = L.map('map').setView(cyberCoord, 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Auto-detect user position
map.locate({setView: true, maxZoom: 16});
map.on('locationfound', function(e) {
    userPos = e.latlng;
    if (marker) map.removeLayer(marker);
    // 把 "Origin Detected" 改成了 "Your current location"
    marker = L.marker(e.latlng).addTo(map).bindPopup("Your current location").openPopup();
});
map.on('locationerror', function(e) {
    console.log("Location error: ", e.message);
    alert("Location access blocked by browser. Showing default map area.");
});

        // --- Logic Functions ---

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            // Allow map to recalculate its width after transition
            setTimeout(() => { map.invalidateSize(); }, 350);
        }

        function recenterMap(event) {
    event.stopPropagation(); // Prevent map click event bubbling
    
    // Check if user's actual location is successfully retrieved
    if (userPos) {
        // If yes, fly smoothly to user's location with zoom level 16
        map.flyTo(userPos, 16);
    } else {
        // If geolocation is pending or denied, fallback to default origin (Cyberjaya)
        map.flyTo(cyberCoord, 15);
    }
       }

        // Add marker on manual click
        map.on('click', function(e) {
            if (marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map).bindPopup("Pinned Location").openPopup();
        });

        // Fix rendering on initial load
        window.onload = function() {
            setTimeout(() => { map.invalidateSize(); }, 500);
        };

/* --- Improved Toggle Logic --- */

// --- 升级版：智能跟随的 Settings Toggle ---
function toggleSettings() {
    const modal = document.getElementById('settingsModal');
    const settingsBtn = document.querySelector('[title="Settings"]'); // 抓取 Settings 按钮

    if (modal.style.display === 'block') {
        modal.style.display = 'none';
    } else {
        // 1. 获取 Settings 按钮在当前屏幕上的实时位置
        const rect = settingsBtn.getBoundingClientRect();
        
        // 2. 覆盖 CSS 样式，强制它跟随按钮的坐标
        modal.style.position = 'fixed';
        modal.style.left = (rect.right + 15) + 'px'; // 自动定位到 Sidebar 右侧，留出 15px 的空隙
        modal.style.bottom = (window.innerHeight - rect.bottom) + 'px'; // 底部完美与按钮对齐
        
        // 3. 显示面板
        modal.style.display = 'block';
    }
}
// Keep the specific close function for background clicks
function closeSettings() {
    document.getElementById('settingsModal').style.display = 'none';
}

// Background change logic
function changeBg(color) {
    const mainContent = document.getElementById('main-content');
    if (!mainContent) return;

    if (color === 'default') {
        mainContent.style.backgroundImage = ""; 
    } else {
        mainContent.style.backgroundImage = "none";
        mainContent.style.backgroundColor = color;
    }
}
// 切换字体逻辑
function changeFont(fontFamily) {
    // 获取整个页面的根容器或 body
    document.body.style.fontFamily = fontFamily;
}


// --- Filters 筛选面板控制逻辑 ---

// 打开或关闭 Filter 面板
function toggleFilters(event) {
    if (event) event.stopPropagation(); // 阻止事件冒泡，防止触发 window 点击
    const modal = document.getElementById('filterModal');
    if (modal.style.display === 'block') {
        modal.style.display = 'none';
    } else {
        modal.style.display = 'block';
    }
}

// 关闭 Filter 面板
function closeFilters() {
    document.getElementById('filterModal').style.display = 'none';
}

// 点击 Apply 按钮时触发的筛选过滤逻辑
function applyFilters() {
    // 获取用户勾选的所有动物类型
    const selectedAnimals = Array.from(document.querySelectorAll('input[name="animalFilter"]:checked')).map(cb => cb.value);
    // 获取用户勾选的所有健康状态
    const selectedHealth = Array.from(document.querySelectorAll('input[name="healthFilter"]:checked')).map(cb => cb.value);

    console.log("Selected Animals:", selectedAnimals);
    console.log("Selected Health:", selectedHealth);

    // 过滤完成后自动关闭面板
    closeFilters();
}

function changeFont(fontType) {
    let fontStack = "";
    
    switch(fontType) {
        case 'sans':
            fontStack = "'Segoe UI', Roboto, Helvetica, Arial, sans-serif";
            break;
        case 'serif':
            fontStack = "Georgia, 'Times New Roman', Times, serif";
            break;
        case 'mono':
            fontStack = "'Courier New', Courier, monospace";
            break;
        default:
            fontStack = "sans-serif";
    }
    
    document.body.style.fontFamily = fontStack;
    localStorage.setItem('userFont', fontStack);
}
// Toggle the user dropdown menu
function toggleUserMenu() {
    const menu = document.getElementById('userMenu');
    menu.classList.toggle('show');
}

// Global click listener to close menus when clicking outside
// Global click listener: 一次性处理所有面板（头像菜单、设置、筛选）的点击外部关闭逻辑
window.addEventListener('click', function(event) {
    // 1. 处理设置面板的关闭
    const settingsModal = document.getElementById('settingsModal');
    const settingsBtn = document.querySelector('[title="Settings"]');
    if (settingsModal && settingsModal.style.display === 'block' && 
        !settingsModal.contains(event.target) && 
        (!settingsBtn || !settingsBtn.contains(event.target))) {
        closeSettings();
    }

    // 2. 处理筛选面板的关闭
    const filterModal = document.getElementById('filterModal');
    const filterBtn = document.getElementById('filter-btn');
    if (filterModal && filterModal.style.display === 'block' && 
        !filterModal.contains(event.target) && 
        (!filterBtn || !filterBtn.contains(event.target))) {
        closeFilters();
    }

    // 3. 处理头像下拉菜单的关闭
    const userMenu = document.getElementById('userMenu');
    const avatarTrigger = document.getElementById('avatarTrigger');
    if (userMenu && userMenu.classList.contains('show')) {
        if (event.target !== avatarTrigger && !userMenu.contains(event.target)) {
            userMenu.classList.remove('show');
        }
    }
});
    </script>

<div class="settings-item" onclick="changeFont('sans')">

</div>
<div class="settings-item" onclick="changeFont('mono')">

</div>
<div class="settings-item" onclick="changeFont('serif')">

</div>
