<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Animal Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0f1117;
            --surface:   #181c27;
            --border:    #262c3d;
            --text:      #e8eaf0;
            --muted:     #636a82;
            --accent:    #4f8bff;
            --pending:   #f5a623;
            --approved:  #3ecf8e;
            --rejected:  #f55c5c;
            --hover:     #1e2335;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Sidebar */
        .layout { display: flex; min-height: 100vh; }

        .sidebar {
            width: 240px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 32px 0;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            padding: 0 24px 32px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-brand h2 {
            font-size: 13px;
            font-family: 'DM Mono', monospace;
            color: var(--accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .sidebar-brand p {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }

        .sidebar-nav {
            padding: 20px 12px;
            flex: 1;
        }

        .nav-label {
            font-size: 10px;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0 12px;
            margin-bottom: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 2px;
        }

        .nav-item:hover { background: var(--hover); color: var(--text); }
        .nav-item.active { background: rgba(79,139,255,0.12); color: var(--accent); }

        .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

        /* ── Stats strip in sidebar ── */
        .sidebar-stats {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .stat-pill {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            background: var(--bg);
            margin-bottom: 6px;
            font-size: 12px;
        }

        .stat-pill span:first-child { color: var(--muted); }
        .stat-pill .count { font-family: 'DM Mono', monospace; font-weight: 500; }
        .count.pending  { color: var(--pending); }
        .count.approved { color: var(--approved); }
        .count.rejected { color: var(--rejected); }

        /* ── Main content ── */
        .main {
            margin-left: 240px;
            flex: 1;
            padding: 40px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .topbar h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .topbar p { font-size: 13px; color: var(--muted); margin-top: 3px; }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'DM Sans', sans-serif;
        }

        .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ── Filter tabs ── */
        .filter-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
            width: fit-content;
        }

        .tab {
            padding: 7px 18px;
            border-radius: 7px;
            font-size: 13px;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.15s;
            border: none;
            background: none;
            font-family: 'DM Sans', sans-serif;
        }

        .tab:hover { color: var(--text); }
        .tab.active { background: var(--accent); color: white; }

        /* ── Table ── */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        thead tr {
            border-bottom: 1px solid var(--border);
        }

        th {
            padding: 14px 20px;
            text-align: left;
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 500;
        }

        td {
            padding: 16px 20px;
            font-size: 13.5px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--hover); }

        .animal-cell { display: flex; align-items: center; gap: 10px; }
        .animal-emoji { font-size: 20px; }
        .animal-name { font-weight: 500; }
        .animal-qty { font-size: 11px; color: var(--muted); margin-top: 2px; }

        /* ── Status badge ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge.pending  { background: rgba(245,166,35,0.12);  color: var(--pending);  }
        .badge.approved { background: rgba(62,207,142,0.12); color: var(--approved); }
        .badge.rejected { background: rgba(245,92,92,0.12);  color: var(--rejected); }
        .badge::before { content: '●'; font-size: 7px; }

        /* ── Action buttons ── */
        .actions { display: flex; gap: 6px; }

        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-approve {
            background: rgba(62,207,142,0.1);
            color: var(--approved);
            border-color: rgba(62,207,142,0.25);
        }
        .btn-approve:hover { background: rgba(62,207,142,0.2); }

        .btn-reject {
            background: rgba(245,92,92,0.1);
            color: var(--rejected);
            border-color: rgba(245,92,92,0.25);
        }
        .btn-reject:hover { background: rgba(245,92,92,0.2); }

        .btn-view {
            background: rgba(79,139,255,0.1);
            color: var(--accent);
            border-color: rgba(79,139,255,0.25);
        }
        .btn-view:hover { background: rgba(79,139,255,0.2); }

        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* ── Empty state ── */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .empty .icon { font-size: 40px; margin-bottom: 12px; }
        .empty p { font-size: 14px; }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 540px;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 28px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 { font-size: 16px; font-weight: 600; }

        .modal-close {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .modal-close:hover { color: var(--text); border-color: var(--text); }

        .modal-body { padding: 28px; }

        .modal-image {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .no-image {
            width: 100%;
            height: 120px;
            border: 1px dashed var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }

        .detail-item label {
            display: block;
            font-size: 10px;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 5px;
        }

        .detail-item p {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }

        .detail-full { margin-bottom: 20px; }
        .detail-full label {
            display: block;
            font-size: 10px;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 5px;
        }

        .detail-full p {
            font-size: 13.5px;
            color: var(--text);
            line-height: 1.6;
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .modal-actions .btn {
            flex: 1;
            padding: 10px;
            font-size: 13px;
            text-align: center;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 999;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: var(--approved); }
        .toast.error   { border-color: var(--rejected); }

        /* ── Loading spinner ── */
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-row td {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }

        .export-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.15s;
            text-decoration: none;
        }
        .export-btn.excel {
            background: rgba(33,115,70,0.12);
            color: #3ecf8e;
            border-color: rgba(62,207,142,0.3);
        }
        .export-btn.excel:hover { background: rgba(33,115,70,0.22); }
        .export-btn.pdf {
            background: rgba(220,53,69,0.1);
            color: #f55c5c;
            border-color: rgba(245,92,92,0.3);
        }
        .export-btn.pdf:hover { background: rgba(220,53,69,0.2); }

        /* ── Sidebar profile card ── */
        .sidebar-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            margin-top: 4px;
        }

        .profile-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(79,139,255,0.18);
            color: var(--accent);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            text-transform: uppercase;
        }

        .profile-avatar.guest {
            background: rgba(99,106,130,0.18);
            color: var(--muted);
        }

        .profile-info {
            flex: 1;
            min-width: 0;
        }

        .profile-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-role {
            font-size: 10px;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 2px;
        }

        .profile-role.role-admin   { color: var(--accent); }
        .profile-role.role-guest   { color: var(--muted); }

        .profile-logout {
            font-size: 15px;
            color: var(--muted);
            text-decoration: none;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .profile-logout:hover { color: var(--rejected); background: rgba(245,92,92,0.1); }
        .profile-logout.hidden { display: none; }
    </style>
</head>
<body>
<div class="layout">

    # Sidebar
    <aside class="sidebar">
    <div class="sidebar-brand">
        <h2>Cyberjaya Stray Scan</h2>
        <p>Admin Dashboard</p>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-label">Menu</div>
        <div class="nav-item active">
            <span class="icon">📋</span> Reports
        </div>
        <div class="nav-item" onclick="window.location.href='/'">
            <span class="icon">📝</span> Submit Form
        </div>
    </nav>
    <div class="sidebar-stats">
        <div class="stat-pill">
            <span>Pending</span>
            <span class="count pending" id="countPending">—</span>
        </div>
        <div class="stat-pill">
            <span>Approved</span>
            <span class="count approved" id="countApproved">—</span>
        </div>
        <div class="stat-pill">
            <span>Rejected</span>
            <span class="count rejected" id="countRejected">—</span>
        </div>
    </div>

    <!-- ── Profile card ── -->
    <div class="sidebar-profile" id="sidebarProfile">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div class="profile-info">
            <div class="profile-name" id="profileName">Loading...</div>
            <div class="profile-role" id="profileRole"></div>
        </div>
        <a class="profile-logout" id="profileLogout" href="/logout" title="Logout">⏻</a>
    </div>
</aside>

    <!-- Main -->
    <main class="main">
        <div class="topbar">
            <div>
                <h1>Animal Reports</h1>
                <p id="reportCount">Loading reports...</p>
            </div>
<div style="display:flex;gap:8px;align-items:center;">
                <a class="export-btn excel" href="/export/excel" download>
                    📊 Export Excel
                </a>
                <a class="export-btn pdf" href="/export/pdf" download>
                    📄 Export PDF
                </a>
                <button class="refresh-btn" onclick="loadReports()">
                    ↻ Refresh
                </button>
            </div>
        </div>

        <!-- Filter tabs -->
        <div class="filter-tabs">
            <button class="tab active" onclick="setFilter('all', this)">All</button>
            <button class="tab" onclick="setFilter('pending', this)">Pending</button>
            <button class="tab" onclick="setFilter('approved', this)">Approved</button>
            <button class="tab" onclick="setFilter('rejected', this)">Rejected</button>

            <button class="refresh-btn" onclick="toggleSort()">
                <span id="sortIcon">↓</span> <span id="sortLabel">Newest First</span>
            </button>
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Animal</th>
                        <th>Location</th>
                        <th>Health</th>
                        <th>Status</th>
                        <th>Submitted</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="reportTable">
                    <tr class="loading-row">
                        <td colspan="7"><div class="spinner"></div></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Report Details</h3>
            <button class="modal-close" onclick="closeModalDirect()">✕</button>
        </div>
        <div class="modal-body">
            <div id="modalImage"></div>
            <div class="detail-grid">
                <div class="detail-item">
                    <label>Animal</label>
                    <p id="mAnimal">—</p>
                </div>
                <div class="detail-item">
                    <label>Quantity</label>
                    <p id="mQty">—</p>
                </div>
                <div class="detail-item">
                    <label>Location</label>
                    <p id="mLocation">—</p>
                </div>
                <div class="detail-item">
                    <label>Health</label>
                    <p id="mHealth">—</p>
                </div>
                <div class="detail-item">
                    <label>Status</label>
                    <p id="mStatus">—</p>
                </div>
                <div class="detail-item">
                    <label>Submitted</label>
                    <p id="mDate">—</p>
                </div>
                <div class="detail-item" style="grid-column: 1 / -1;">
                    <label>Submitted By</label>
                    <p id="mSubmittedBy">—</p>
                </div>
            </div>
            <div class="detail-full">
                <label>Description</label>
                <p id="mDetails">—</p>
            </div>
            <div class="modal-actions">
                <button class="btn btn-approve" id="modalApproveBtn" onclick="updateStatusFromModal('approved')">✓ Approve</button>
                <button class="btn btn-reject"  id="modalRejectBtn"  onclick="updateStatusFromModal('rejected')">✕ Reject</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    const EMOJI_MAP = {
        dog: '🐕', cat: '🐈', rabbit: '🐰', hamster: '🐹',
        bird: '🐦', fish: '🐠', squirrel: '🐿️', hedgehog: '🦔',
        deer: '🦌', fox: '🦊', 'wild-bird': '🦅', snake: '🐍', other: '🐾'
    };

    let allReports = [];
    let currentFilter = 'all';
    let activeReportId = null;

    // Load all reports from API and render table
    async function loadReports() {
        document.getElementById('reportTable').innerHTML =
            '<tr class="loading-row"><td colspan="7"><div class="spinner"></div></td></tr>';

        try {
            const res  = await fetch('/reports');
            const json = await res.json();
            allReports = json.data;
            updateStats();
            renderTable();
        } catch (e) {
            document.getElementById('reportTable').innerHTML =
                '<tr><td colspan="7" style="text-align:center;color:var(--rejected);padding:40px">Failed to load reports.</td></tr>';
        }
    }

    // Sidebar stat counts 
    function updateStats() {
        const count = s => allReports.filter(r => r.status === s).length;
        document.getElementById('countPending').textContent  = count('pending');
        document.getElementById('countApproved').textContent = count('approved');
        document.getElementById('countRejected').textContent = count('rejected');
        document.getElementById('reportCount').textContent   =
            `${allReports.length} total report${allReports.length !== 1 ? 's' : ''}`;
    }

    // Filter tab
    function setFilter(filter, el) {
        currentFilter = filter;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderTable();
    }

    //  Render table rows 
    function renderTable() {
        const filtered = currentFilter === 'all'
            ? allReports
            : allReports.filter(r => r.status === currentFilter);

        if (filtered.length === 0) {
            document.getElementById('reportTable').innerHTML = `
                <tr><td colspan="7">
                    <div class="empty">
                        <div class="icon">🔍</div>
                        <p>No ${currentFilter === 'all' ? '' : currentFilter + ' '}reports found.</p>
                    </div>
                </td></tr>`;
            return;
        }

        document.getElementById('reportTable').innerHTML = filtered.map(r => `
            <tr>
                <td><span style="font-family:'DM Mono',monospace;color:var(--muted)">#${r.id}</span></td>
                <td>
                    <div class="animal-cell">
                        <span class="animal-emoji">${EMOJI_MAP[r.animal_type] || '🐾'}</span>
                        <div>
                            <div class="animal-name">${capitalize(r.animal)}</div>
                            <div class="animal-qty">${r.quantity} found</div>
                        </div>
                    </div>
                </td>
                <td>${r.location}</td>
                <td>${capitalize(r.health)}</td>
                <td><span class="badge ${r.status}">${r.status}</span></td>
                <td style="color:var(--muted);font-size:12px">${r.created_at}</td>
                <td>
                    <div class="actions">
                        <button class="btn btn-view"    onclick="openModal(${r.id})">View</button>
                        <button class="btn btn-approve" onclick="updateStatus(${r.id},'approved')"
                            ${r.status === 'approved' ? 'disabled' : ''}>✓</button>
                        <button class="btn btn-reject"  onclick="updateStatus(${r.id},'rejected')"
                            ${r.status === 'rejected' ? 'disabled' : ''}>✕</button>
                        <button class="btn btn-reject"  onclick="deleteReport(${r.id})" style="background:rgba(245,92,92,0.15)" title="Delete">🗑</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    //  Open detail modal 
    function openModal(id) {
        const r = allReports.find(x => x.id === id);
        if (!r) return;
        activeReportId = id;

        document.getElementById('modalTitle').textContent = `Report #${r.id} — ${capitalize(r.animal)}`;
        document.getElementById('mAnimal').textContent   = capitalize(r.animal);
        document.getElementById('mQty').textContent      = `${r.quantity} animal(s)`;
        document.getElementById('mLocation').textContent = r.location;
        document.getElementById('mHealth').textContent   = capitalize(r.health);
        document.getElementById('mDate').textContent     = r.created_at;
        document.getElementById('mDetails').textContent  = r.details || 'No description provided.';
        document.getElementById('mSubmittedBy').innerHTML = r.submitted_by === 'Guest'
            ? `<span style="color:var(--muted);font-style:italic">👤 Guest (not logged in)</span>`
            : `<span style="color:var(--accent)">🔑 ${r.submitted_by}</span>`;

        // Status badge inside modal
        document.getElementById('mStatus').innerHTML = `<span class="badge ${r.status}">${r.status}</span>`;

        // Image
        const imgContainer = document.getElementById('modalImage');
        if (r.image) {
            imgContainer.innerHTML = `<img class="modal-image" src="/uploads/${r.image}"
                onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'>⚠️ Image unavailable</div>'">`;
        } else {
            imgContainer.innerHTML = `<div class="no-image">📷 No image uploaded</div>`;
        }

        // Disable buttons based on current status
        document.getElementById('modalApproveBtn').disabled = r.status === 'approved';
        document.getElementById('modalRejectBtn').disabled  = r.status === 'rejected';

        document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal(e) {
        if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
    }

    function closeModalDirect() {
        document.getElementById('modalOverlay').classList.remove('open');
        activeReportId = null;
    }

    //  Update status (from table row buttons) 
    async function updateStatus(id, newStatus) {
        try {
            const res  = await fetch(`/reports/${id}/status`, {
                method:  'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ status: newStatus })
            });
            const json = await res.json();

            if (json.status === 'success') {
                // Update local data so we don't need a full reload
                const idx = allReports.findIndex(r => r.id === id);
                if (idx !== -1) allReports[idx] = json.data;
                updateStats();
                renderTable();
                showToast(`Report #${id} marked as ${newStatus}.`, 'success');
            } else {
                showToast('Error: ' + json.message, 'error');
            }
        } catch (e) {
            showToast('Network error. Please try again.', 'error');
        }
    }

    //  Update status from inside the modal 
    async function updateStatusFromModal(newStatus) {
        if (!activeReportId) return;
        await updateStatus(activeReportId, newStatus);
        // Refresh modal content with updated data
        openModal(activeReportId);
    }

    // Toast notification 
    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function capitalize(str) {
        if (!str) return '—';
        return str.charAt(0).toUpperCase() + str.slice(1);
    }

    // Sort toggle
let sortAsc = false;
function toggleSort() {
    sortAsc = !sortAsc;
    document.getElementById('sortIcon').textContent  = sortAsc ? '↑' : '↓';
    document.getElementById('sortLabel').textContent = sortAsc ? 'Oldest First' : 'Newest First';
    allReports.sort((a, b) => {
        const da = new Date(a.created_at), db = new Date(b.created_at);
        return sortAsc ? da - db : db - da;
    });
    renderTable();
}

    // Delete report 
async function deleteReport(id) {
    if (!confirm(`Delete report #${id}? This cannot be undone.`)) return;
    try {
        const res  = await fetch(`/reports/${id}`, { method: 'DELETE' });
        const json = await res.json();
        if (json.status === 'success') {
            allReports = allReports.filter(r => r.id !== id);
            updateStats();
            renderTable();
            showToast(`Report #${id} deleted.`, 'success');
        } else {
            showToast('Error: ' + json.message, 'error');
        }
    } catch (e) {
        showToast('Network error. Please try again.', 'error');
    }
}

// Load profile info into sidebar
async function loadProfile() {
    try {
        const res  = await fetch('/session-info');
        const data = await res.json();

        const avatar  = document.getElementById('profileAvatar');
        const name    = document.getElementById('profileName');
        const role    = document.getElementById('profileRole');
        const logout  = document.getElementById('profileLogout');

        if (data.logged_in) {
            // Show first letter of email as avatar
            avatar.textContent = data.email.charAt(0).toUpperCase();
            avatar.classList.remove('guest');
            name.textContent = data.email;
            role.textContent = data.role;
            role.className = `profile-role role-${data.role}`;
            logout.classList.remove('hidden');
        } else {
            avatar.textContent = '👤';
            avatar.classList.add('guest');
            name.textContent = 'Guest';
            role.textContent = 'Not logged in';
            role.className = 'profile-role role-guest';
            logout.classList.add('hidden');  // hide logout button for guests
        }
    } catch (e) {
        console.warn('Could not load session info:', e);
    }
}

// Initial load — replace the existing single line with both:
loadReports();
loadProfile();

    // Initial load
    loadReports();
</script>
